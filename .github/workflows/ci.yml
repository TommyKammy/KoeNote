name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
  SOLUTION_PATH: KoeNote.slnx
  FAST_TEST_PROJECT_PATH: tests/KoeNote.App.Tests/KoeNote.App.Tests.csproj
  UI_INTEGRATION_TEST_PROJECT_PATH: tests/KoeNote.App.UiIntegrationTests/KoeNote.App.UiIntegrationTests.csproj

defaults:
  run:
    shell: pwsh

jobs:
  pr-fast:
    name: Build and Fast Test
    if: github.event_name == 'pull_request'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET preview
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET info
        run: dotnet --info

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', '**/*.csproj', '**/*.props', '**/*.targets', 'NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore $env:SOLUTION_PATH

      - name: Build
        run: dotnet build $env:SOLUTION_PATH --configuration Release --no-restore

      - name: Fast tests
        run: |
          dotnet test $env:FAST_TEST_PROJECT_PATH `
            --configuration Release `
            --no-build `
            --verbosity normal `
            --filter "Category!=Slow&Category!=UiIntegration"

  full:
    name: Build and Full Test
    if: github.event_name != 'pull_request'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET preview
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET info
        run: dotnet --info

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', '**/*.csproj', '**/*.props', '**/*.targets', 'NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore $env:SOLUTION_PATH

      - name: Build
        run: dotnet build $env:SOLUTION_PATH --configuration Release --no-restore

      - name: Fast tests
        run: dotnet test $env:FAST_TEST_PROJECT_PATH --configuration Release --no-build --verbosity normal

      - name: UI integration tests
        run: dotnet test $env:UI_INTEGRATION_TEST_PROJECT_PATH --configuration Release --no-build --verbosity normal
