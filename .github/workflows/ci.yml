name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION_PATH: KoeNote.slnx
  TEST_PROJECT_PATH: tests/KoeNote.App.Tests/KoeNote.App.Tests.csproj

defaults:
  run:
    shell: pwsh

jobs:
  pr-fast:
    name: Build and Fast Test
    if: github.event_name == 'pull_request'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET preview
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore $env:SOLUTION_PATH

      - name: Build
        run: dotnet build $env:SOLUTION_PATH --configuration Release --no-restore

      - name: Fast tests
        run: |
          dotnet test $env:TEST_PROJECT_PATH `
            --configuration Release `
            --no-build `
            --verbosity normal `
            --filter "Category!=Slow&Category!=UiIntegration"

  full:
    name: Build and Full Test
    if: github.event_name != 'pull_request'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET preview
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore $env:SOLUTION_PATH

      - name: Build
        run: dotnet build $env:SOLUTION_PATH --configuration Release --no-restore

      - name: Full tests
        run: dotnet test $env:TEST_PROJECT_PATH --configuration Release --no-build --verbosity normal
